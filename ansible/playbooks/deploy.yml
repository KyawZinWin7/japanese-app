---
- name: Deploy Laravel application
  hosts: app
  become: true
  vars:
    deploy_host: "{{ deploy_host | default(ansible_host) }}"
    deploy_user: "{{ deploy_user | default(ansible_user) }}"
    site_domain: "{{ site_domain | default(deploy_host) }}"
    letsencrypt_email: "{{ letsencrypt_email | default('') }}"
    app_name: japanese-app
    app_dir: "{{ app_dir | default('/var/www/html/japanese-app') }}"
    repo_url: "https://github.com/KyawZinWin7/japanese-app.git"
    release_ref: "{{ release_ref | default('main') }}"
    node_version: "22.12.0"
    shared_paths:
      - storage/app
      - storage/framework/cache
      - storage/framework/sessions
      - storage/framework/views
      - storage/logs
    system_packages:
      - ca-certificates
      - gnupg
      - unzip
      - git
      - curl
      - nginx
      - certbot
      - python3-certbot-nginx
      - composer
    php_packages:
      - php8.2
      - php8.2-cli
      - php8.2-common
      - php8.2-curl
      - php8.2-fpm
      - php8.2-mbstring
      - php8.2-mysql
      - php8.2-sqlite3
      - php8.2-xml
      - php8.2-zip

  tasks:
    - name: Install base system packages
      ansible.builtin.apt:
        name: "{{ system_packages + php_packages }}"
        state: present
        update_cache: true

    - name: Install Node version manager n
      ansible.builtin.command:
        cmd: /usr/bin/npm install -g n
      environment:
        PATH: "/usr/bin:/usr/local/bin:{{ ansible_facts.env.PATH | default('') }}"

    - name: Force install target Node.js version
      ansible.builtin.shell: |
        export PATH="/usr/local/bin:/usr/bin:$PATH"
        n {{ node_version }}
      args:
        executable: /bin/bash

    - name: Verify active Node.js and npm versions
      ansible.builtin.shell: |
        export PATH="/usr/local/bin:/usr/bin:$PATH"
        echo "NODE=$(node --version)"
        echo "NPM=$(npm --version)"
        command -v node
        command -v npm
      args:
        executable: /bin/bash
      register: node_runtime_check
      changed_when: false

    - name: Show Node.js runtime details
      ansible.builtin.debug:
        var: node_runtime_check.stdout_lines

    - name: Ensure web services are enabled and started
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - php8.2-fpm
        - nginx

    - name: Create application base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/shared"
        - "{{ app_dir }}/releases"

    - name: Create shared storage directories
      ansible.builtin.file:
        path: "{{ app_dir }}/shared/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0775"
      loop: "{{ shared_paths }}"

    - name: Upload production environment file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.env.production"
        dest: "{{ app_dir }}/shared/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

    - name: Define release path
      ansible.builtin.set_fact:
        release_path: "{{ app_dir }}/releases/{{ release_ref }}"

    - name: Checkout release
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ release_path }}"
        version: "{{ release_ref }}"
        force: true
      become_user: "{{ deploy_user }}"

    - name: Link shared environment file
      ansible.builtin.file:
        src: "{{ app_dir }}/shared/.env"
        dest: "{{ release_path }}/.env"
        state: link
        force: true

    - name: Replace storage with shared symlink
      ansible.builtin.file:
        path: "{{ release_path }}/storage"
        state: absent

    - name: Link shared storage directory
      ansible.builtin.file:
        src: "{{ app_dir }}/shared/storage"
        dest: "{{ release_path }}/storage"
        state: link
        force: true

    - name: Remove node_modules before clean install
      ansible.builtin.file:
        path: "{{ release_path }}/node_modules"
        state: absent

    - name: Install Composer dependencies
      ansible.builtin.command:
        cmd: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Install Node dependencies
      ansible.builtin.command:
        cmd: /usr/local/bin/npm ci
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_facts.env.PATH | default('') }}"

    - name: Build frontend assets
      ansible.builtin.command:
        cmd: /usr/local/bin/npm run build
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"
      environment:
        PATH: "/usr/local/bin:/usr/bin:{{ ansible_facts.env.PATH | default('') }}"

    - name: Run database migrations when enabled
      ansible.builtin.command:
        cmd: php artisan migrate --force
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"
      when: (run_migrations | default(false)) | bool

    - name: Cache Laravel bootstrap files
      ansible.builtin.command:
        cmd: php artisan optimize
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Update current symlink
      ansible.builtin.file:
        src: "{{ release_path }}"
        dest: "{{ app_dir }}/current"
        state: link
        force: true

    - name: Ensure writable Laravel directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: www-data
        mode: "0775"
        recurse: true
      loop:
        - "{{ app_dir }}/shared/storage"
        - "{{ release_path }}/bootstrap/cache"

    - name: Install Nginx site configuration
      ansible.builtin.template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}.conf
        mode: "0644"
      vars:
        ssl_enabled: false

    - name: Enable Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ app_name }}.conf
        dest: /etc/nginx/sites-enabled/{{ app_name }}.conf
        state: link
        force: true

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t

    - name: Reload Nginx before issuing certificate
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Ensure Let's Encrypt email is provided
      ansible.builtin.assert:
        that:
          - letsencrypt_email | length > 0
        fail_msg: "Provide letsencrypt_email to enable HTTPS certificate provisioning."

    - name: Ensure Let's Encrypt certificate exists
      ansible.builtin.command:
        cmd: >-
          certbot certonly --webroot -w {{ app_dir }}/current/public
          -d {{ site_domain }}
          --email {{ letsencrypt_email }}
          --agree-tos
          --non-interactive
          --keep-until-expiring
      register: certbot_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_result.stdout"

    - name: Install Nginx site configuration with HTTPS
      ansible.builtin.template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}.conf
        mode: "0644"
      vars:
        ssl_enabled: true

    - name: Test Nginx configuration with HTTPS
      ansible.builtin.command: nginx -t

    - name: Reload PHP-FPM
      ansible.builtin.service:
        name: php8.2-fpm
        state: reloaded

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

