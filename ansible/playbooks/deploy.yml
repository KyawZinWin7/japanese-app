---
- name: Deploy Laravel application
  hosts: app
  become: true
  vars:
    deploy_host: "{{ deploy_host | default(ansible_host) }}"
    deploy_user: "{{ deploy_user | default(ansible_user) }}"
    server_name: "{{ server_name | default(deploy_host) }}"
    app_name: japanese-app
    app_dir: "{{ app_dir | default('/var/www/html/japanese-app') }}"
    repo_url: "https://github.com/KyawZinWin7/japanese-app.git"
    release_ref: "{{ release_ref | default('main') }}"
    db_name: "{{ db_name | default('japanese_app') }}"
    db_user: "{{ db_user | default('japanese_user') }}"
    db_password: "{{ db_password | default('change-me') }}"
    mysql_socket: /var/run/mysqld/mysqld.sock
    shared_paths:
      - storage/app
      - storage/framework/cache
      - storage/framework/sessions
      - storage/framework/views
      - storage/logs
    system_packages:
      - ca-certificates
      - gnupg
      - unzip
      - git
      - curl
      - python3-pymysql
      - nginx
      - mysql-server
      - composer
    php_packages:
      - php8.2
      - php8.2-cli
      - php8.2-common
      - php8.2-curl
      - php8.2-fpm
      - php8.2-mbstring
      - php8.2-mysql
      - php8.2-sqlite3
      - php8.2-xml
      - php8.2-zip

  tasks:
    - name: Install base system packages
      ansible.builtin.apt:
        name: "{{ system_packages + php_packages }}"
        state: present
        update_cache: true

    - name: Configure NodeSource repository
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js from NodeSource
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Ensure core services are enabled and started
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - mysql
        - php8.2-fpm
        - nginx

    - name: Create application database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci
        login_unix_socket: "{{ mysql_socket }}"

    - name: Create application database user
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        host: localhost
        state: present
        login_unix_socket: "{{ mysql_socket }}"

    - name: Create application base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/shared"
        - "{{ app_dir }}/releases"

    - name: Create shared storage directories
      ansible.builtin.file:
        path: "{{ app_dir }}/shared/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0775"
      loop: "{{ shared_paths }}"

    - name: Upload production environment file
      ansible.builtin.copy:
        src: .env.production
        dest: "{{ app_dir }}/shared/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

    - name: Define release path
      ansible.builtin.set_fact:
        release_path: "{{ app_dir }}/releases/{{ release_ref }}"

    - name: Checkout release
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ release_path }}"
        version: "{{ release_ref }}"
        force: true
      become_user: "{{ deploy_user }}"

    - name: Link shared environment file
      ansible.builtin.file:
        src: "{{ app_dir }}/shared/.env"
        dest: "{{ release_path }}/.env"
        state: link
        force: true

    - name: Replace storage with shared symlink
      ansible.builtin.file:
        path: "{{ release_path }}/storage"
        state: absent

    - name: Link shared storage directory
      ansible.builtin.file:
        src: "{{ app_dir }}/shared/storage"
        dest: "{{ release_path }}/storage"
        state: link
        force: true

    - name: Install Composer dependencies
      ansible.builtin.command:
        cmd: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Install Node dependencies
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Build frontend assets
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Run database migrations
      ansible.builtin.command:
        cmd: php artisan migrate --force
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Cache Laravel bootstrap files
      ansible.builtin.command:
        cmd: php artisan optimize
        chdir: "{{ release_path }}"
      become_user: "{{ deploy_user }}"

    - name: Update current symlink
      ansible.builtin.file:
        src: "{{ release_path }}"
        dest: "{{ app_dir }}/current"
        state: link
        force: true

    - name: Ensure writable Laravel directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: www-data
        mode: "0775"
        recurse: true
      loop:
        - "{{ app_dir }}/shared/storage"
        - "{{ release_path }}/bootstrap/cache"

    - name: Install Nginx site configuration
      ansible.builtin.template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}.conf
        mode: "0644"

    - name: Enable Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ app_name }}.conf
        dest: /etc/nginx/sites-enabled/{{ app_name }}.conf
        state: link
        force: true

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t

    - name: Reload PHP-FPM
      ansible.builtin.service:
        name: php8.2-fpm
        state: reloaded

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
